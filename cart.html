<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | D'Vaaw Fragrances</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@300;400;500;600&display=swap');
        @font-face { font-family: 'Willsyard'; src: url('fonts/Willsyard.woff2') format('woff2'), url('fonts/Willsyard.ttf') format('truetype'); font-weight: normal; font-style: normal; font-display: swap; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        nav {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            width: 100%;
            z-index: 10;
        }

        .nav-links, .nav-icons {
            display: flex;
            gap: 25px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover, .nav-icons a:hover {
            color: #d4af37;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            color: #fff;
        }

        .page-header {
            background-color: #f9f9f9;
            padding: 50px 5%;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .checkout-steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
        }

        .step.active {
            color: #111;
            font-weight: 600;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 5px;
        }

        .cart-container {
            display: flex;
            padding: 60px 10%;
            gap: 50px;
            flex: 1;
        }

        .cart-items-wrapper {
            flex: 2;
        }

        .cart-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            padding-bottom: 15px;
            border-bottom: 1px solid #111;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 600;
            color: #666;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }

        .item-details {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .item-img {
            width: 100px;
            height: 120px;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-img img {
            max-height: 100px;
            object-fit: contain;
        }

        .item-info h3 {
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .item-info p {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        .item-variant {
            display: inline-block;
            background-color: #eee;
            padding: 4px 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            width: fit-content;
        }

        .qty-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            transition: background 0.3s ease;
        }

        .qty-btn:hover {
            background-color: #f9f9f9;
            color: #111;
        }

        .qty-input {
            width: 40px;
            text-align: center;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            pointer-events: none;
        }

        .item-price {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .item-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 1.5rem;
            transition: color 0.3s ease;
            text-align: right;
        }

        .item-remove:hover {
            color: #d4af37;
        }

        .continue-shopping {
            display: inline-block;
            margin-top: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #111;
            padding-bottom: 2px;
        }

        .cart-summary {
            flex: 1;
            background-color: #fcfcfc;
            border: 1px solid #eee;
            padding: 40px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-summary h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #555;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 1.2rem;
            font-weight: 600;
            color: #111;
            text-transform: uppercase;
        }

        .checkout-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            background-color: #25D366;
            color: #fff;
            text-align: center;
            padding: 18px 0;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .checkout-btn:hover {
            background-color: #128C7E;
        }

        .checkout-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .empty-cart-msg {
            padding: 40px 0;
            font-size: 1rem;
            color: #888;
            text-align: center;
        }

        footer {
            background-color: #000;
            color: #fff;
            padding: 60px 10% 20px;
            margin-top: auto;
        }

        .footer-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 60px;
        }

        .footer-col h4 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #d4af37;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 12px;
        }

        .footer-col ul li a {
            font-size: 0.8rem;
            color: #aaa;
            transition: color 0.3s ease;
        }

        .footer-col ul li a:hover {
            color: #fff;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 20px;
            font-size: 0.7rem;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* === ANIMATIONS + RESPONSIVE === */
        html { scroll-behavior: smooth; }
        @keyframes pageFadeIn { from { opacity:0; transform:translateY(18px);} to {opacity:1;transform:translateY(0);} }
        body { animation: pageFadeIn 0.7s ease both; }
        .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.7s ease,transform 0.7s ease; }
        .reveal.visible { opacity:1; transform:translateY(0); }
        .reveal-left { opacity:0; transform:translateX(-40px); transition:opacity 0.7s ease,transform 0.7s ease; }
        .reveal-left.visible { opacity:1; transform:translateX(0); }
        .reveal-right { opacity:0; transform:translateX(40px); transition:opacity 0.7s ease,transform 0.7s ease; }
        .reveal-right.visible { opacity:1; transform:translateX(0); }
        @keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:0.75;text-shadow:0 0 18px #d4af37;} }
        .logo { animation:shimmer 4s ease-in-out infinite; }
        nav { backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:padding 0.3s ease,background 0.3s ease; }
        nav.scrolled { padding:12px 5% !important; background-color:rgba(0,0,0,0.98) !important; }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; z-index:100; }
        .hamburger span { display:block; width:24px; height:2px; background:#fff; transition:all 0.3s ease; border-radius:2px; }
        .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
        .hamburger.open span:nth-child(2){opacity:0;}
        .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
        .mobile-menu { display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(5,5,5,0.98); z-index:99; flex-direction:column; align-items:center; justify-content:center; gap:30px; }
        .mobile-menu.open { display:flex; animation:menuSlideIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes menuSlideIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        .mobile-menu-logo { font-family:'Willsyard','Playfair Display',serif; font-size:2.4rem; font-weight:400; font-style:normal; color:#d4af37; margin-bottom:10px; letter-spacing:4px; }
        .mobile-menu-divider { width:40px; height:1px; background:#d4af37; opacity:0.4; margin-bottom:10px; }
        .mobile-menu a { color:#fff; font-size:1rem; text-transform:uppercase; letter-spacing:4px; font-weight:300; transition:all 0.3s ease; padding:6px 0; border-bottom:1px solid transparent; }
        .mobile-menu a:hover { color:#d4af37; border-bottom-color:rgba(212,175,55,0.3); }
        .mobile-menu-close { position:absolute; top:28px; right:6%; background:none; border:1px solid rgba(212,175,55,0.4); color:#d4af37; width:44px; height:44px; border-radius:50%; cursor:pointer; font-size:1.3rem; display:flex; align-items:center; justify-content:center; transition:all 0.3s ease; line-height:1; }
        .mobile-menu-close:hover { background:#d4af37; color:#000; border-color:#d4af37; transform:rotate(90deg); }
        .product-card { transition:box-shadow 0.4s ease,transform 0.4s ease !important; }
        .product-card:hover { box-shadow:0 20px 50px rgba(0,0,0,0.12) !important; transform:translateY(-6px); }
        .product-card img { transition:transform 0.5s ease; }
        .product-card:hover img { transform:scale(1.04); }
        .category-card { transition:box-shadow 0.4s ease; }
        .category-card:hover { box-shadow:0 20px 50px rgba(212,175,55,0.18); }
        .btn,.btn-dark { position:relative; overflow:hidden; }
        @keyframes heroPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.025);} }
        .hero-image img { animation:heroPulse 8s ease-in-out infinite; }
        @media (max-width:1024px) {
            .products-grid { grid-template-columns:repeat(2,1fr) !important; }
            .hero { padding:100px 4% 0 5%; }
            .hero-content h1 { font-size:3rem; }
            .cart-container { padding:40px 4%; gap:30px; flex-wrap:wrap; }
            .checkout-container { padding:40px 4%; gap:30px; flex-wrap:wrap; }
            .footer-columns { grid-template-columns:repeat(2,1fr); }
        }
        @media (max-width:768px) {
            .nav-links,.nav-icons { display:none !important; }
            .hamburger { display:flex !important; }
            .hero { flex-direction:column; min-height:100svh; padding:80px 5% 40px; text-align:center; align-items:center; }
            .hero-content { max-width:100%; }
            .hero-content h1 { font-size:2.2rem; }
            .hero-content p { font-size:0.85rem; }
            .hero-image { width:85%; margin:0 auto; }
            .categories { flex-direction:column; padding:4%; }
            .category-card img { height:220px; }
            .feature-banner { height:auto; padding:60px 6%; }
            .feature-content h2 { font-size:1.5rem; }
            .products-grid { grid-template-columns:repeat(2,1fr) !important; gap:15px; }
            .product-card { padding:16px; }
            .product-card img { height:160px; }
            .product-title { font-size:0.9rem; }
            .cart-container { flex-direction:column; padding:24px 4%; }
            .cart-header { display:none; }
            .cart-item { grid-template-columns:1fr auto; gap:10px; }
            .item-img { width:70px; height:85px; }
            .cart-summary { position:static; }
            .checkout-container { flex-direction:column; padding:24px 4%; }
            .form-row { flex-direction:column; gap:0; }
            .summary-section { position:static; }
            .filters { gap:10px; }
            .filter-btn { font-size:0.7rem; letter-spacing:1px; }
            .footer-columns { grid-template-columns:1fr; }
            .footer-bottom { flex-direction:column; gap:10px; text-align:center; }
            .footer-socials a { margin:0 8px; }
            .page-header h1 { font-size:1.8rem; }
            .page-header { padding:40px 5%; }
            .section-header h2 { font-size:1.2rem; }
            .category-collection,.latest-collection,.shop-section { padding:50px 4% 30px; }
        }
        @media (max-width:400px) {
            .hero-content h1 { font-size:1.8rem; }
            .products-grid { grid-template-columns:1fr !important; }
        }

        .cart-icon-wrap { position: relative; display: inline-flex; align-items: center; }
        .cart-badge { position: absolute; top: -8px; right: -12px; background: #d4af37; color: #000; border-radius: 50%; width: 17px; height: 17px; font-size: 0.6rem; font-weight: 700; display: none; align-items: center; justify-content: center; line-height: 1; }
        .cart-badge.show { display: flex; }

        /* Cookie consent banner */
        .cookie-banner { position:fixed; bottom:0; left:0; width:100%; background:#111; color:#fff; padding:16px 5%; display:flex; align-items:center; justify-content:space-between; gap:20px; z-index:9998; transform:translateY(100%); transition:transform 0.4s ease; flex-wrap:wrap; border-top:1px solid #222; }
        .cookie-banner.show { transform:translateY(0); }
        .cookie-banner p { font-size:0.78rem; color:#bbb; line-height:1.6; flex:1; min-width:200px; }
        .cookie-banner a { color:#d4af37; text-decoration:underline; }
        .cookie-btns { display:flex; gap:10px; flex-shrink:0; }
        .cookie-accept { background:#d4af37; color:#000; border:none; padding:9px 20px; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; font-weight:700; font-family:'Montserrat',sans-serif; cursor:pointer; transition:background 0.3s; }
        .cookie-accept:hover { background:#c9a227; }
        .cookie-decline { background:transparent; color:#888; border:1px solid #333; padding:9px 20px; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; font-family:'Montserrat',sans-serif; cursor:pointer; transition:all 0.3s; }
        .cookie-decline:hover { border-color:#888; color:#fff; }
    </style>

</head>
<body>

    <!-- NAVIGATION -->
    
    <div class="mobile-menu-divider"></div>
        <a href="category-her.html">For Her</a>
        <a href="category-him.html">For Him</a>
        <a href="category-unisex.html">Unisex</a>
        <a href="category-borneo.html">Borneo Edition</a>
        <a href="about.html">About Us</a>
        <a href="cart.html" style="color:#d4af37;">Cart</a>
    </div>

    <!-- PAGE HEADER -->
    <header class="page-header">
        <h1>Your Cart</h1>
        <div class="checkout-steps">
            <span class="step active">1. Cart</span> &mdash;
            <span class="step">2. Order via WhatsApp</span>
        </div>
    </header>

    <!-- CART SYSTEM -->
    <section class="cart-container">

        <div class="cart-items-wrapper">
            <div class="cart-header">
                <div>Product</div>
                <div>Quantity</div>
                <div>Total</div>
                <div></div>
            </div>

            <div id="cart-content"></div>

            <a href="shop-all.html" class="continue-shopping">&larr; Continue Shopping</a>
        </div>

        <div class="cart-summary">
            <h2>Order Summary</h2>

            <div class="summary-row">
                <span>Subtotal</span>
                <span>RM<span id="summary-subtotal">0.00</span></span>
            </div>

            <div class="summary-row">
                <span>Shipping</span>
                <span>RM<span id="summary-shipping">0.00</span></span>
            </div>

            <div class="summary-total">
                <span>Total</span>
                <span>RM<span id="summary-total">0.00</span></span>
            </div>

            <button class="checkout-btn" onclick="window.checkout()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
                Proceed to WhatsApp
            </button>
        </div>
    </section>

    <!-- FOOTER -->
    

    <!-- CART & FIREBASE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxOigVTO2ZCeKYoVRJvU085fEiEL9EKOI",
            authDomain: "d-vaaw-perfume.firebaseapp.com",
            databaseURL: "https://d-vaaw-perfume-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "d-vaaw-perfume",
            storageBucket: "d-vaaw-perfume.firebasestorage.app",
            messagingSenderId: "176200300799",
            appId: "1:176200300799:web:ee8893e3e3e6a4dd14b4ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WHATSAPP_NUMBER = "601118866239";

        window.loadCart = function() {
            const cartContent = document.getElementById('cart-content');
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];

            if (cart.length === 0) {
                cartContent.innerHTML = '<div class="empty-cart-msg">Your cart is currently empty.</div>';
                window.updateTotals(cart);
                return;
            }

            cartContent.innerHTML = '';
            cart.forEach((item, index) => {
                cartContent.innerHTML += `
                <div class="cart-item">
                    <div class="item-details">
                        <div class="item-img"><img src="${item.image}" alt="${item.title}"></div>
                        <div class="item-info">
                            <h3>${item.title}</h3>
                            <p>Category: ${item.category}</p>
                            <span class="item-variant">${item.variant}</span>
                        </div>
                    </div>
                    <div class="qty-selector">
                        <button class="qty-btn minus" onclick="window.updateQty(${index}, -1)">-</button>
                        <input type="text" class="qty-input" value="${item.qty}" readonly>
                        <button class="qty-btn plus" onclick="window.updateQty(${index}, 1)">+</button>
                    </div>
                    <div class="item-price">RM<span class="row-total">${(item.price * item.qty).toFixed(2)}</span></div>
                    <button class="item-remove" onclick="window.removeItem(${index})" title="Remove Item">&times;</button>
                </div>
                `;
            });
            window.updateTotals(cart);
        };

        window.updateQty = function(index, change) {
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart'));
            cart[index].qty += change;
            if (cart[index].qty < 1) cart[index].qty = 1;
            localStorage.setItem('dvaaw_cart', JSON.stringify(cart));
            window.loadCart();
        };

        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart'));
            cart.splice(index, 1);
            localStorage.setItem('dvaaw_cart', JSON.stringify(cart));
            window.loadCart();
        };

        window.updateTotals = function(cart) {
            let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const shipping = subtotal > 0 ? 10.00 : 0.00;

            document.getElementById('summary-subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('summary-shipping').textContent = shipping.toFixed(2);
            document.getElementById('summary-total').textContent = (subtotal + shipping).toFixed(2);
        };

        window.checkout = function() {
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];

            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            const btn = document.querySelector('.checkout-btn');
            btn.innerHTML = 'Opening WhatsApp...';
            btn.style.pointerEvents = 'none';

            let subtotal = document.getElementById('summary-subtotal').textContent;
            let shipping = document.getElementById('summary-shipping').textContent;
            let total = document.getElementById('summary-total').textContent;

            // 1. BUILD WHATSAPP MESSAGE
            let message = `*NEW ORDER - D'VAAW PERFUME* 🌟\n\n`;
            message += `*ORDER ITEMS*\n`;
            cart.forEach(item => {
                const itemTotal = (item.price * item.qty).toFixed(2);
                message += `▪️ ${item.qty}x ${item.title} (${item.variant}) - RM${itemTotal}\n`;
            });
            message += `\n*PAYMENT SUMMARY*\n`;
            message += `Subtotal: RM${subtotal}\n`;
            message += `Shipping: RM${shipping}\n`;
            message += `*Total to Pay: RM${total}*\n\n`;
            message += `Hi! I would like to place this order. Please let me know how to proceed with payment and provide my shipping details.`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;

            // 2. SAVE TO FIREBASE IN BACKGROUND (no await — non-blocking)
            addDoc(collection(db, "orders"), {
                orderItems: cart,
                subtotal: parseFloat(subtotal),
                shippingFee: parseFloat(shipping),
                totalAmount: parseFloat(total),
                status: "Pending WhatsApp Confirmation",
                timestamp: serverTimestamp()
            }).catch((error) => {
                console.error("Firebase save failed.", error);
            });

            // 3. CLEAR CART
            localStorage.removeItem('dvaaw_cart');

            // 4. REDIRECT IMMEDIATELY — nothing runs before this now
            window.location.href = whatsappUrl;

            // 5. Reload cart display after redirect (for back-button users)
            setTimeout(() => {
                window.loadCart();
            }, 500);
        };

        document.addEventListener('DOMContentLoaded', window.loadCart);
    </script>
