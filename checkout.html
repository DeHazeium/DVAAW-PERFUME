        .checkout-steps { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        .step.active { color: #111; font-weight: 600; border-bottom: 2px solid #d4af37; padding-bottom: 5px; }

        .checkout-container { display: flex; padding: 60px 10%; gap: 50px; flex: 1; }

        .shipping-section { flex: 2; }

        input, select { width: 100%; padding: 12px 15px; border: 1px solid #ddd; background-color: #fcfcfc; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; color: #111; outline: none; transition: border-color 0.3s ease; }
        input:focus, select:focus { border-color: #111; }

        .summary-section { flex: 1.2; background-color: #fcfcfc; border: 1px solid #eee; padding: 40px; height: fit-content; position: sticky; top: 20px; }
        .summary-section h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }

        .item-met

        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 1.2rem; font-weight: 600; color: #111; text-transform: uppercase; }

        .checkout-btn { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; background-color: #25D366; color: #fff; text-align: center; padding: 18px 0; margin-top: 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; transition: background 0.3s ease; }

<body>

    
    <div class="mobile-menu-divider"></div>
        <a href="category-her.html">For Her</a>
        <a href="category-him.html">For Him</a>
        <a href="category-unisex.html">Unisex</a>
        <a href="category-borneo.html">Borneo Edition</a>
        <a href="about.html">About Us</a>

    <header class="page-header">
        <h1>Checkout</h1>
        <div class="checkout-steps">
            <span class="step">1. Cart</span> &mdash;
            <span class="step active">2. Checkout</span> &mdash;
            <span class="step">3. Complete</span>
        </div>
    </header>

    <section class="checkout-container">
        <div class="shipping-section">
            <h2>Shipping Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="phone">WhatsApp Number</label>
                    <input type="tel" id="phone" required placeholder="e.g. 0123456789">
                </div>
                <div class="form-group">
                    <label for="address">Full Address</label>
                    <input type="text" id="address" required placeholder="House number, street name, building">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="postcode">Postcode</label>
                        <input type="text" id="postcode" required placeholder="e.g. 94300">
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required placeholder="e.g. Kota Samarahan">
                    </div>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <select id="state" required>
                        <option value="Sarawak" selected>Sarawak</option>
                        <option value="Sabah">Sabah</option>
                        <option value="Johor">Johor</option>
                        <option value="Kedah">Kedah</option>
                        <option value="Kelantan">Kelantan</option>
                        <option value="Melaka">Melaka</option>
                        <option value="Negeri Sembilan">Negeri Sembilan</option>
                        <option value="Pahang">Pahang</option>
                        <option value="Penang">Penang</option>
                        <option value="Perak">Perak</option>
                        <option value="Perlis">Perlis</option>
                        <option value="Selangor">Selangor</option>
                        <option value="Terengganu">Terengganu</option>
                        <option value="Kuala Lumpur">Kuala Lumpur</option>
                        <option value="Putrajaya">Putrajaya</option>
                        <option value="Labuan">Labuan</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="summary-section">
            <h2>Order Summary</h2>
            <div class="summary-items" id="summary-items-container"></div>
            <div class="summary-row">
                <span>Subtotal</span>
                <span>RM<span id="summary-subtotal">0.00</span></span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>RM<span id="summary-shipping">0.00</span></span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span>RM<span id="summary-total">0.00</span></span>
            </div>
            <button class="checkout-btn" onclick="processWhatsAppOrder()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
                Place Order via WhatsApp
            </button>
        </div>
    </section>

    

    <script>
        const WHATSAPP_NUMBER = "601118866239";

        document.addEventListener('DOMContentLoaded', loadCheckoutSummary);

        function loadCheckoutSummary() {
            const container = document.getElementById('summary-items-container');
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];
            if (cart.length === 0) { window.location.href = 'cart.html'; return; }

            let subtotal = 0;
            container.innerHTML = '';
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                container.innerHTML += `
                    <div class="summary-item">
                        <div class="item-name">${item.qty}x ${item.title}<span class="item-meta">${item.variant}</span></div>
                        <div>RM${itemTotal.toFixed(2)}</div>
                    </div>`;
            });

            const shipping = 10.00;
            document.getElementById('summary-subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('summary-shipping').textContent = shipping.toFixed(2);
            document.getElementById('summary-total').textContent = (subtotal + shipping).toFixed(2);
        }

        function processWhatsAppOrder() {
            const form = document.getElementById('checkout-form');
            if (!form.checkValidity()) { form.reportValidity(); return; }

            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const postcode = document.getElementById('postcode').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;

            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];
            let subtotal = document.getElementById('summary-subtotal').textContent;
            let shipping = document.getElementById('summary-shipping').textContent;
            let total = document.getElementById('summary-total').textContent;

            let message = `*NEW ORDER - D'VAAW PERFUME* 🌟\n\n`;
            message += `*CUSTOMER DETAILS*\n`;
            message += `Name: ${name}\n`;
            message += `Phone: ${phone}\n`;
            message += `Address: ${address}, ${postcode} ${city}, ${state}\n\n`;
            message += `*ORDER ITEMS*\n`;
            cart.forEach(item => {
                message += `▪️ ${item.qty}x ${item.title} (${item.variant}) - RM${(item.price * item.qty).toFixed(2)}\n`;
            });
            message += `\n*PAYMENT SUMMARY*\n`;
            message += `Subtotal: RM${subtotal}\n`;
            message += `Shipping: RM${shipping}\n`;
            message += `*Total to Pay: RM${total}*\n\n`;
            message += `Please provide me with your bank details/QR Pay to complete this order. Thank you!`;

            const encodedMessage = encodeURIComponent(message);
            localStorage.removeItem('dvaaw_cart');
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
        }
    </script>

    </script>
